name: docs

# Build and deploy the MkDocs Material walkthrough site to GitHub Pages.
#
# Asciinema casts are committed under docs-site/assets/casts/*.cast — the
# workflow does not record them. To refresh: run ./scripts/record-walkthrough.sh
# locally and commit the resulting .cast files.
#
# Repo setup needed once: Settings → Pages → Source = "GitHub Actions".
# (configure-pages' `enablement: true` option needs a PAT with admin scope
# to enable Pages programmatically — not worth the secret management for a
# one-time toggle in the GitHub UI.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; queue rather than cancel so a slow build
# doesn't lose work-in-progress.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: install docs deps
        run: uv sync --extra docs
      - name: build site
        # --strict turns warnings (broken links, missing nav entries) into
        # build failures. Catches regressions early.
        run: uv run mkdocs build --strict
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

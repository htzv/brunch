name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All third-party actions are pinned by full commit SHA, with the human-
# readable tag in a trailing comment. This makes supply-chain compromise of
# any single action a non-issue here until we deliberately bump the SHA.
# When updating, look up `gh api repos/<org>/<repo>/git/refs/tags/<vN.M.P>
# --jq '.object.sha'` and bump both the SHA and the comment together.

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: install deps
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format check
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: install deps
        run: uv sync --extra dev
      - name: mypy
        run: uv run mypy src

  test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: install python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: install deps
        run: uv sync --extra dev --python ${{ matrix.python-version }}
      - name: configure git identity
        run: |
          git config --global user.name "brunch-ci"
          git config --global user.email "brunch-ci@example.invalid"
      - name: pytest (with coverage)
        run: uv run --python ${{ matrix.python-version }} pytest --cov=brunch --cov-report=term-missing

  build:
    runs-on: ubuntu-24.04
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: build wheel + sdist
        run: uv build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: brunch-dist
          path: dist/
          retention-days: 7

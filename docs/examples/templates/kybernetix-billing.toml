# kybernetix-billing
#
# Multitenant billing slice of the kbrntx product. Touches the backend
# (tenant API + quota enforcement), the frontend (billing dashboards), and
# the data-pipelines workers (usage rollups + invoicing jobs).
#
# Usage:
#   cp docs/examples/templates/kybernetix-billing.toml ~/.config/brunch/templates/
#   brunch init task-2345-billing-quotas -t kybernetix-billing

description = "Kybernetix billing slice: backend + frontend + data-pipelines."

[[repo]]
repo = "kybernetix/backend"

[[repo]]
repo = "kybernetix/frontend"

[[repo]]
repo = "kybernetix/data-pipelines"

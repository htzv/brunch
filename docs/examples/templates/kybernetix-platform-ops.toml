# kybernetix-platform-ops
#
# Platform / ops tasks touching terraform + container infra and the
# backend (since infra changes often need coordinated backend tweaks —
# config flags, health-check endpoints, migration runners).
#
# Usage:
#   cp docs/examples/templates/kybernetix-platform-ops.toml ~/.config/brunch/templates/
#   brunch init task-4567-bump-base-images -t kybernetix-platform-ops

description = "Kybernetix platform/ops: devops + oci-base-images + backend."

[[repo]]
repo = "kybernetix/devops"

[[repo]]
repo = "kybernetix/oci-base-images"

[[repo]]
repo = "kybernetix/backend"
